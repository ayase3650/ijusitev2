<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>各種申請 | SHIMONOSEKI LIFE</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="style.css">

    <style>
        /* ＝＝＝ 白い大きな角丸の枠組み ＝＝＝ */
        .white-board {
            background-color: var(--fugu-belly); /* 真っ白 */
            border-radius: 50px;
            padding: 60px 40px;
            margin: 40px auto 100px auto;
            box-shadow: 0 15px 40px rgba(0, 180, 216, 0.1);
            max-width: 1100px;
        }

        /* ＝＝＝ 各種申請ページ専用のデザイン ＝＝＝ */
        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .page-header h2 {
            font-size: 2.2rem;
            color: var(--fugu-blue);
            font-weight: 900;
            margin-bottom: 15px;
        }
        .page-header p {
            font-weight: 700;
            color: #555;
            line-height: 1.6;
        }

        .app-card-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 30px; 
            max-width: 1000px;
            margin: 0 auto;
        }
        .app-card { 
            background: white; padding: 30px; border-radius: 30px; text-align: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s; border: 4px solid transparent; 
            display: flex; flex-direction: column; width: 100%;
        }
        .app-card:hover { transform: translateY(-10px); border-color: var(--fugu-blue); box-shadow: 0 15px 30px rgba(0, 180, 216, 0.2); }
        .app-card-icon { color: var(--fugu-fin); margin-bottom: 15px; display: flex; justify-content: center; }
        
        .app-card h4 { 
            font-size: 1.3rem; 
            margin-bottom: 15px; 
            color: var(--fugu-blue); 
            min-height: 3.6rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            line-height: 1.4;
        }
        .app-card p { font-size: 0.95rem; line-height: 1.6; color: #555; margin-bottom: 20px; }
        
        .app-btn-detail { 
            display: inline-block; padding: 15px 25px; background-color: var(--fugu-fin); color: white; 
            border-radius: 30px; font-weight: bold; transition: 0.3s; text-decoration: none;
            margin-top: auto; 
        }
        .app-btn-detail:hover { background-color: #e38a15; transform: scale(1.05); }

        /* スマホ向けの微調整 */
        @media (max-width: 768px) {
            .white-board { padding: 40px 20px; border-radius: 30px; }
        }
    </style>
</head>
<body>

    <div class="ocean-bg">
        <div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div>
    </div>

    <script src="header.js"></script>

    <div class="container">
        <div class="white-board">
            <div class="page-header">
                <h2>各種申請・手続き</h2>
                <p>移住に関する支援制度の申請はこちらから行えます。<br>ご不明な点があれば、お気軽にお問い合わせください。</p>
            </div>

            <div class="app-card-grid">
                <div class="app-card">
                    <div class="app-card-icon">
                        <span class="material-symbols-outlined" style="font-size: 3rem;">edit_document</span>
                    </div>
                    <h4>移住支援金の申請</h4>
                    <p>東京圏から移住し、就業や<br>起業をした方の申請フォーム。</p>
                    <a href="subsidy-form.html" class="app-btn-detail">申請フォームへ</a>
                </div>
                
                <div class="app-card">
                    <div class="app-card-icon">
                        <span class="material-symbols-outlined" style="font-size: 3rem;">directions_transit</span>
                    </div>
                    <h4>YY!ターン交通費補助<br>実施報告書提出</h4>
                    <p>交通費補助を利用された方の<br>実施報告書の提出フォーム。</p>
                    <a href="yy-turn-form.html" class="app-btn-detail">報告書を提出する</a>
                </div>

                <div class="app-card">
                    <div class="app-card-icon">
                        <span class="material-symbols-outlined" style="font-size: 3rem;">maps_home_work</span>
                    </div>
                    <h4>暮らしサポート補助金</h4>
                    <p>UIJターンした若者・子育て<br>世帯の家賃を一部助成します。</p>
                    <a href="life-support-form.html" class="app-btn-detail">申請フォームへ</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
